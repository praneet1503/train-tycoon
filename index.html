<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Train Tycoon</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css" />
  <link rel="stylesheet" href="layout.css" />
  <link rel="stylesheet" href="components.css" />
</head>

<body class="app-shell">
  <div id="map" class="map-canvas"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>
  <div id="gameClock" class="card panel-zone dock-panel dock-panel-stats stats-card" data-panel="stats">
    <h2 class="card-title">Game Stats</h2>
    <div class="stats-grid">
      <div class="stats-row">
        <p class="stats-label">Game Day</p>
        <p class="stats-value" id="gameDay">0</p>
      </div>
      <div class="stats-row">
        <p class="stats-label">Money</p>
        <p class="stats-value money-value" id="playerMoney">$0</p>
      </div>
    </div>
    <p class="game-clock-note">1 min = 1 day</p>
  </div>

  <div id="routeBuilder" class="card panel-zone dock-panel dock-panel-routes route-builder-card" data-panel="routes">
    <h2 class="card-title">Route Buying</h2>

    <div class="route-section">
      <label class="field-label" for="fromStation">From Station</label>
      <select id="fromStation"></select>

      <label class="field-label" for="toStation">To Station</label>
      <select id="toStation"></select>
    </div>

    <div class="route-section">
      <button class="action-button" id="calculateRouteBtn">Calculate Route</button>
    </div>

    <div class="route-section route-details">
      <p class="section-title">Route Details</p>
      <p>Distance: <strong id="routeDistance">--</strong></p>
      <p>Cost: <strong id="routeCost">--</strong></p>
      <p>Build Time: <strong id="routeTime">--</strong></p>
    </div>

    <div class="route-section route-build-action">
      <button class="action-button" id="buildRouteBtn" disabled>Build Route</button>
      <p id="routeStatus" class="route-status"></p>
    </div>
  </div>

  <div id="trainPanel" class="card panel-zone dock-panel dock-panel-trains train-panel" data-panel="trains">
    <h2 class="card-title">Train Operations</h2>
    <p class="train-panel-subtitle">Live running trains and route build delta timers</p>
    <p class="panel-section-title">Running Trains</p>
    <ul id="runningTrainsList" class="panel-list"></ul>
    <p class="panel-section-title">Routes Building</p>
    <ul id="buildingRoutesList" class="panel-list"></ul>
  </div>

  <div id="panelDock" class="panel-dock">
    <div id="settingsWrap" class="settings-wrap">
      <button id="settingsBtn" class="panel-icon-btn" type="button" aria-label="Settings">
        <span class="panel-icon panel-icon-settings"></span>
        <span class="panel-icon-label">Settings</span>
      </button>
      <div id="settingsMenu" class="settings-menu">
        <p class="settings-title">Game Settings</p>
        <button id="resetGameBtn" class="settings-danger-btn" type="button">Reset Game Data</button>
        <p class="settings-danger-note">Warning: this will delete all saved progress.</p>
      </div>
    </div>

    <button class="panel-icon-btn panel-dock-btn" type="button" data-panel-target="stats" aria-label="Stats">
      <span class="panel-icon panel-icon-stats"></span>
      <span class="panel-icon-label">Stats</span>
    </button>
    <button class="panel-icon-btn panel-dock-btn" type="button" data-panel-target="routes" aria-label="Routes">
      <span class="panel-icon panel-icon-routes"></span>
      <span class="panel-icon-label">Routes</span>
    </button>
    <button class="panel-icon-btn panel-dock-btn" type="button" data-panel-target="trains" aria-label="Trains">
      <span class="panel-icon panel-icon-trains"></span>
      <span class="panel-icon-label">Trains</span>
    </button>
  </div>

  <div id="incomePopupContainer" class="income-popup-container"></div>
  <script src="script.js"></script>
</body>
</html>
